name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs folder
        run: |
          rm -rf docs
          mkdir docs

      - name: Create keys.js in docs
        run: |
          echo "window.apiKey = '${{ secrets.API_KEY }}';" > docs/keys.js
          echo "window.playlistId = '${{ secrets.PLAYLIST_ID }}';" >> docs/keys.js

      - name: Copy site files to docs
        run: |
          cp index.html docs/
          cp style.css docs/
          cp player.js docs/
          cp watch.js docs/
          cp watch.html docs/

          cp favicon.svg docs/
          cp rucka.png docs/
          cp radio.brodiaga.jpg docs/ || true

          cp -r img docs/ || true
          cp -r assets docs/ || true
          cp -r pages docs/ || true
          cp -r posts docs/ || true

          cp robots.txt docs/
          cp sitemap.xml docs/
          cp manifest.json docs/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
