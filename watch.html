<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр видео — Radio Brodiaga</title>

    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
</head>

<body>

<header id="site-header">

  <div class="header-row">

      <div class="header-left">
        <img class="site-logo" 
             src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/radio.brodiaga.jpg" 
             alt="Radio Brodiaga">
      </div>

      <div class="header-center">
          <div id="header-preview" class="header-preview">
              <img id="preview-thumb" class="preview-thumb" src="" alt="Video preview">
              <div id="preview-title" class="preview-title"></div>
          </div>
      </div>

      <nav class="right-menu">
        <ul>
          <li><img src="/rucka.png" class="menu-knob"><a href="index.html">Главная</a></li>
          <li><img src="/rucka.png" class="menu-knob"><a href="#">Музыка</a></li>
          <li><img src="/rucka.png" class="menu-knob"><a href="posts/example.html">Посты</a></li>
          <li><img src="/rucka.png" class="menu-knob"><a href="pages/contact.html">Контакты</a></li>
        </ul>
      </nav>

  </div>

</header>


<div class="video-page">

    <div class="player-wrapper">

        <div class="video-player-container">
            <video id="player" playsinline controls></video>
        </div>

        <div class="action-panel">
            <div class="panel-section rating-section">
                <div class="stars" id="ratingStars">
                    <span data-value="1">☆</span>
                    <span data-value="2">☆</span>
                    <span data-value="3">☆</span>
                    <span data-value="4">☆</span>
                    <span data-value="5">☆</span>
                </div>
            </div>
          </div>
            <div class="panel-section comment-section" onclick="goToComments()">
                Комментарий
            </div>

            <div class="panel-section private-section" onclick="openPrivateForm()">
                В приват
            </div>
        </div>

  

    <h1 id="video-title" class="video-title-page"></h1>
</div>

    
    <h1 id="video-title" class="video-title-page"></h1>
    <p id="video-description" class="video-description"></p>
    <p id="video-date" class="video-date"></p>

    <h2 class="related-title">Похожие видео</h2>
   
       <!-- Реклама Гугла -->
    <div id="related-videos"></div>
    <div class="watch-ad">
    <!-- Радио-горизонтальное на странице просмотра -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-7483662712371460"
     data-ad-slot="7897698404"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
</div>
<script>
    (adsbygoogle = window.adsbygoogle || []).push({});
</script>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="player.js"></script>
<script src="watch.js"></script>

</body>
</html>
