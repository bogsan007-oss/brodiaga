<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player</title>

    <link rel="stylesheet" href="styleRadio.css">
</head>

<body>

<header class="top-bar">
    <div class="header-desktop">

        <!-- ЛОГО -->
        <div class="logo-left">
            <img src="https://radio.brodiaga.com/radio.brodiaga.jpg" alt="Radio Brodiaga">
        </div>

        <!-- КНОПКА PLAY -->
        <div class="play-btn-desktop"></div>

        <!-- ЕДИНСТВЕННЫЙ ПЛЕЕР -->
        <audio id="player-desktop" preload="auto"></audio>

        <!-- ПРЕВЬЮ -->
        <div class="preview-right">
            <img src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/Shanson.png" alt="Preview">
        </div>

    </div>
</header>

<section class="stations-list" id="stations">

    <!-- Шансон -->
    <div class="station" onclick="setStation(
        'https://chanson.hostingradio.ru:8041/chanson256.mp3',
        'https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/Shanson.png'
    )">
        <img src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/Shanson.png" alt="Шансон">
    </div>

    <!-- Ретро -->
    <div class="station" onclick="setStation(
        'https://retro.hostingradio.ru/retro256.mp3',
        'https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/retroRadio.png'
    )">
        <img src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/retroRadio.png" alt="Ретро">
    </div>

</section>

<script src="player.js"></script>

</body>
</html>
