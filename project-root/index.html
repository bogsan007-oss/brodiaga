<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player</title>

    <link rel="stylesheet" href="styleRadio.css">
</head>
<body>

<header class="top-bar">
    <div class="top-right">
        <div class="logo-btn">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <div class="home-btn">
            <img src="assets/icons/home.svg" alt="Home">
        </div>
    </div>
</header>

<section class="player-row">

    <!-- Плеер -->
    <div class="player-block">
        <div class="station-title">Название радио</div>

        <!-- ВАЖНО: кнопка должна быть DIV -->
        <div class="play-btn"></div>

        <audio id="player" src="https://radio.brodiaga.com/%D0%9F%D1%80%D0%BE%D1%81%D1%82%D0%B8%20%D0%93%D0%B0%D0%B3%D0%B0%D1%80%D0%B8%D0%BD.mp3"></audio>
    </div>

    <!-- Визуализатор рядом -->
    <div class="visualizer-block">
        <canvas id="visualizer"></canvas>
    </div>

</section>

<section class="stations-list" id="stations"></section>

<!-- ВАЖНО: сначала player.js, потом visualizer.js -->
<script src="player.js"></script>
<script src="visualizer.js"></script>

</body>
</html>
