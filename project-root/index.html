<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player</title>

    <link rel="stylesheet" href="styleRadio.css">
</head>

<body>

<!-- =========================================================
     ХЕДЕР — ПК-версия
     ========================================================= -->
<header class="top-bar">
    <div class="top-right">

<div class="header-desktop">

    <!-- ЛОГОТИП СЛЕВА -->
    <div class="logo-left">
        <img src="https://radio.brodiaga.com/radio.brodiaga.jpg" alt="Radio Brodiaga">
    </div>

    <!-- КНОПКА PLAY (пока пустая) -->
    <div class="play-btn-desktop"></div>

    <!-- ВИЗУАЛИЗАТОР -->
    <div class="visualizer-block-desktop">
        <canvas id="visualizer-desktop"></canvas>
    </div>

    <!-- ПРЕВЬЮ СПРАВА -->
    <div class="preview-right">
        <img src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/Shanson.png" alt="Preview">
    </div>

    <!-- ЕДИНСТВЕННЫЙ ПРАВИЛЬНЫЙ ПЛЕЕР -->
    <audio id="player-desktop" preload="none"></audio>

</div>
        
</header>

<!-- =========================================================
     МОБИЛЬНЫЙ ПЛЕЕР (старый, но рабочий)
     ========================================================= -->
<section class="player-row">

    <div class="player-block">

        <!-- НАЗВАНИЕ — МОЖНО УБРАТЬ ПОТОМ -->
        <div class="station-title">Название радио</div>

        <!-- КНОПКА PLAY -->
        <div class="play-btn"></div>
       
    </div>

    <!-- ВИЗУАЛИЗАТОР -->
    <div class="visualizer-block">
        <canvas id="visualizer"></canvas>
    </div>

</section>

<!-- =========================================================
     СПИСОК СТАНЦИЙ
     ========================================================= -->
<section class="stations-list" id="stations">

    <!-- Станция 1 — Шансон -->
    <div class="station" onclick="setStation(
    'https://radio.brodiaga.com/%D0%9F%D1%80%D0%BE%D1%81%D1%82%D0%B8%20%D0%93%D0%B0%D0%B3%D0%B0%D1%80%D0%B8%D0%BD.mp3',
    'https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/Shanson.png'
)">
        <img src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/Shanson.png" alt="Шансон">
    </div>

    <!-- Станция 2 — Ретро -->
    <div class="station" onclick="setStation(
    'https://retro.hostingradio.ru/retro256.mp3',
    'https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/retroRadio.png'
)">
        <img src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/assets/stations/retroRadio.png" alt="Ретро">
    </div>

</section>

<!-- =========================================================
     СКРИПТЫ
     ========================================================= -->
<script src="player.js"></script>
<!-- <script src="visualizer.js"></script> -->

</body>
</html>
