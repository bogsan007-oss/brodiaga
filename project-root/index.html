<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player</title>

    <link rel="stylesheet" href="styleRadio.css">
</head>
<body>

<!-- ============================
     ПК-ВЕРСИЯ ХЕДЕРА
     Логотип → Play → Audio → Визуализатор → Превью
     ============================ -->
<header class="top-bar">

    <!-- Этот блок показывается только на компьютере -->
    <div class="header-desktop">

        <!-- ЛОГОТИП СЛЕВА -->
        <div class="logo-left">
            <img src="https://radio.brodiaga.com/radio.brodiaga.jpg" alt="Radio Brodiaga">
        </div>

        <!-- КНОПКА PLAY (ПК-версия) -->
        <div class="play-btn-desktop"></div>

        <!-- АУДИО-ПЛЕЕР (ПК-версия) -->
        <audio id="player-desktop" src="https://radio.brodiaga.com/Прости Гагарин.mp3"></audio>

        <!-- ВИЗУАЛИЗАТОР (ПК-версия) -->
        <div class="visualizer-block-desktop">
            <canvas id="visualizer-desktop"></canvas>
        </div>

        <!-- ПРЕВЬЮ СПРАВА -->
        <div class="preview-right">
            <img src="assets/stations/shanson.png" alt="Preview">
        </div>

    </div>

    <!-- ============================
         МОБИЛЬНАЯ ВЕРСИЯ ХЕДЕРА
         Логотип + Home
         ============================ -->
    <div class="header-mobile">

        <div class="logo-btn">
            <img src="assets/logo.png" alt="Logo">
        </div>

        <div class="home-btn">
            <img src="assets/icons/home.svg" alt="Home">
        </div>

    </div>

</header>

<!-- ============================
     МОБИЛЬНЫЙ ПЛЕЕР
     Название → Play → Audio → Визуализатор
     ============================ -->
<section class="player-row-mobile">

    <div class="player-block">
        <!-- НАЗВАНИЕ ТОЛЬКО ДЛЯ МОБИЛЬНОЙ ВЕРСИИ -->
        <div class="station-title">Название радио</div>

        <!-- КНОПКА PLAY (мобильная) -->
        <div class="play-btn"></div>

        <!-- АУДИО-ПЛЕЕР (мобильная версия) -->
        <audio id="player" src="https://radio.brodiaga.com/Прости Гагарин.mp3"></audio>
    </div>

    <!-- ВИЗУАЛИЗАТОР (мобильная версия) -->
    <div class="visualizer-block">
        <canvas id="visualizer"></canvas>
    </div>

</section>

<!-- ============================
     СПИСОК СТАНЦИЙ
     ============================ -->
<section class="stations-list" id="stations"></section>

<!-- ============================
     СКРИПТЫ
     ============================ -->
<script src="player.js"></script>
<script src="visualizer.js"></script>

</body>
</html>
