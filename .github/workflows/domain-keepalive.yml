name: Domain Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Check domain
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://radio.brodiaga.com)

          if [ "$STATUS" != "200" ]; then
            echo "Domain not responding, forcing refresh..."

            curl -X PURGE https://radio.brodiaga.com
            curl -X PURGE https://bogsan007-oss.github.io/radio.brodiaga.com
          else
            echo "Domain OK: $STATUS"
          fi
