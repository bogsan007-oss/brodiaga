name: Generate Sitemap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate sitemap in docs
        run: |
          rm -f docs/sitemap.xml

          echo '<?xml version="1.0" encoding="UTF-8"?>' > docs/sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> docs/sitemap.xml

          # Все HTML-файлы внутри docs
          find docs -name "*.html" | while read file; do
            clean="${file#docs/}"
            url="https://radio.brodiaga.com/docs/$clean"
            echo "<url><loc>$url</loc></url>" >> docs/sitemap.xml
          done

          # Плейлисты YouTube
          PLAYLIST_IDS="PLFaaHMye1-yZBk5Z4EzxkzRf9j1m_NX-E PLFaaHMye1-yapSv6zpzE2d3CzmigR-yGg PLFaaHMye1-yakkCa3Un2YDFhoZjLt_qSI PLFaaHMye1-yZbC7gtMl55N_Gv45wBjS2k PLFaaHMye1-yZjsgMXCngGbqPKVLZfT8vR"

          for playlist in $PLAYLIST_IDS; do
            curl -s "https://www.googleapis.com/youtube/v3/playlistItems?key=${{ secrets.API_KEY }}&playlistId=$playlist&part=contentDetails&maxResults=50" > playlist.json

            cat playlist.json | jq -r '.items[].contentDetails.videoId' | while read id; do
              echo "<url><loc>https://radio.brodiaga.com/docs/watch.html?id=$id</loc></url>" >> docs/sitemap.xml
            done
          done

          echo '</urlset>' >> docs/sitemap.xml

      - name: Commit sitemap
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/sitemap.xml
          git commit -m "Auto-update sitemap" || echo "No changes"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
