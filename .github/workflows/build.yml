name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          rm -rf site
          mkdir site

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml

          find . -name "*.html" | while read file; do
            clean="${file#./}"
            url="https://radio.brodiaga.com/$clean"
            echo "<url><loc>$url</loc></url>" >> sitemap.xml
          done

          PLAYLIST_IDS="PLFaaHMye1-yZBk5Z4EzxkzRf9j1m_NX-E PLFaaHMye1-yapSv6zpzE2d3CzmigR-yGg PLFaaHMye1-yakkCa3Un2YDFhoZjLt_qSI PLFaaHMye1-yZbC7gtMl55N_Gv45wBjS2k PLFaaHMye1-yZjsgMXCngGbqPKVLZfT8vR"

          for playlist in $PLAYLIST_IDS; do
            curl -s "https://www.googleapis.com/youtube/v3/playlistItems?key=${{ secrets.API_KEY }}&playlistId=$playlist&part=contentDetails&maxResults=50" > playlist.json

            jq -r '.items[].contentDetails.videoId' playlist.json | while read id; do
              echo "<url><loc>https://radio.brodiaga.com/watch.html?id=$id</loc></url>" >> sitemap.xml
            done

            rm -f playlist.json
          done

          echo '</urlset>' >> sitemap.xml

      - name: Create keys.js
        run: |
          echo "window.apiKey = '${{ secrets.API_KEY }}';" > site/keys.js
          echo "window.playlistId = '${{ secrets.PLAYLIST_ID }}';" >> site/keys.js

      - name: Copy site files
        run: |
          cp index.html site/
          cp style.css site/
          cp player.js site/
          cp watch.js site/
          cp watch.html site/

          cp favicon.svg site/
          cp rucka.png site/
          cp radio.brodiaga.jpg site/ || true

          cp -r img site/ || true
          cp -r assets site/ || true
          cp -r pages site/ || true
          cp -r posts site/ || true

          cp robots.txt site/
          cp manifest.json site/ || true
          cp sitemap.xml site/

      - name: Add CNAME
        run: |
          echo "radio.brodiaga.com" > site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy
