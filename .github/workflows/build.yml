name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          rm -rf site
          mkdir site

      - name: Create keys.js
        run: |
          echo "window.apiKey = '${{ secrets.API_KEY }}';" > site/keys.js
          echo "window.playlistId = '${{ secrets.PLAYLIST_ID }}';" >> site/keys.js

      - name: Copy site files
        run: |
          cp index.html site/
          cp style.css site/
          cp player.js site/
          cp watch.js site/
          cp watch.html site/

          cp favicon.svg site/
          cp rucka.png site/
          cp radio.brodiaga.jpg site/ || true

          cp -r img site/ || true
          cp -r assets site/ || true
          cp -r pages site/ || true
          cp -r posts site/ || true

          cp robots.txt site/
          cp manifest.json site/ || true
          cp sitemap.xml site/        # ← добавлено

      - name: Add CNAME
        run: |
          echo "radio.brodiaga.com" > site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token:
