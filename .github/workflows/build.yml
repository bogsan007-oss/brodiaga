name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create keys.js
        run: |
          echo "export const apiKey = '${{ secrets.API_KEY }}';" > keys.js
          echo "export const playlistId = '${{ secrets.PLAYLIST_ID }}';" >> keys.js

      - name: Prepare dist
        run: |
          rm -rf dist
          mkdir dist
          cp -r . dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
