<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комментарии</title>
    <link rel="stylesheet" href="../style.css?v=999">
</head>

<body>

    <header class="mini-header">
        <div class="back-btn" onclick="history.back()">← Вернуться назад</div>
        <img src="../radio.brodiaga.jpg" class="mini-logo" alt="logo">
    </header>

    <div class="comments-container">
        <h2>Комментарии</h2>

        <!-- === CUSDIS SSR БЕЗ IFRAME === -->
        <div id="comments"></div>

        <script>
            // Получаем ID видео из URL (?video=XXXX)
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('video') || 'default';

            // Загружаем SSR HTML с Cloudflare Worker
            fetch(`https://YOUR_WORKER_URL/?pageId=${videoId}`)
                .then(r => r.text())
                .then(html => {
                    document.getElementById('comments').innerHTML = html;
                })
                .catch(err => {
                    document.getElementById('comments').innerHTML =
                        "<p style='color:red;'>Ошибка загрузки комментариев</p>";
                });
        </script>
        <!-- === КОНЕЦ SSR === -->

    </div>

    <hr class="divider">

    <button id="write-to-author">Написать лично автору</button>

    <form id="private-form" style="display:none;">
        <input type="text" placeholder="Ваше имя">
        <textarea placeholder="Ваше сообщение"></textarea>
        <button type="submit">Отправить</button>
    </form>

    <script type="module" src="/pages/comments_v2.js?v=1000"></script>

</body>
</html>
