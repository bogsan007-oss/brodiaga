<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta-name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комментарии</title>
    <link rel="stylesheet" href="../style.css?v=999">
</head>

<body>

    <header class="mini-header">
        <div class="back-btn" onclick="history.back()">← Вернуться назад</div>
        <img src="../radio.brodiaga.jpg" class="mini-logo" alt="logo">
    </header>

    <div class="comments-container">
        <h2>Комментарии</h2>

        <!-- === CUSDIS КОММЕНТАРИИ === -->
        <div id="cusdis_thread"
             data-host="https://cusdis.com"
             data-app-id="f3a60707-e3dc-4e6f-a51b-1c3bf1d3b8ee">
        </div>

        <!-- Включаем autoHeight -->
        <script>
            window.CUSDIS_LOCALE = {
                autoHeight: true
            };
        </script>

        <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>

        <script>
            // Получаем ID видео из URL (?video=XXXX)
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('video') || 'default';

            const thread = document.getElementById('cusdis_thread');
            thread.setAttribute('data-page-id', videoId);
            thread.setAttribute('data-page-url', window.location.href);
            thread.setAttribute('data-page-title', 'Комментарии к видео ' + videoId);
        </script>
        <!-- === КОНЕЦ CUSDIS === -->

    </div>

    <hr class="divider">

    <button id="write-to-author">Написать лично автору</button>

    <form id="private-form" style="display:none;">
        <input type="text" placeholder="Ваше имя">
        <textarea placeholder="Ваше сообщение"></textarea>
        <button type="submit">Отправить</button>
    </form>

    <script type="module" src="/pages/comments_v2.js?v=1000"></script>

</body>
</html>
