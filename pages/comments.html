<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комментарии</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .header {
            background: #222;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            margin-top: 0;
        }

        .comment {
            background: #fafafa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #eee;
        }

        .comment small {
            color: #777;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        button {
            margin-top: 10px;
            padding: 10px 16px;
            border: none;
            background: #2b7cff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1f5dcc;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="header">
        <div>Комментарии</div>
        <a class="back" href="../index.html">← Вернуться назад</a>
    </div>

    <div class="container">
        <h2>Оставить комментарий</h2>

        <textarea id="commentText" placeholder="Ваш комментарий..."></textarea>
        <button id="sendComment">Отправить</button>

        <h2 style="margin-top: 30px;">Все комментарии</h2>
        <div id="commentsList"></div>
    </div>

    <!-- ВСТАВЛЯЕМ СЮДА comments_v2.js -->
    <script>
        console.log("СКРИПТ ЗАПУСТИЛСЯ!");

    // Подключение к Supabase
    const supabaseUrl = "https://uyclsolpcfmlhdpvnfji.supabase.co";
    const supabaseKey = "sb-publishable-5RFic9tFvNRGRvYmNnDWnA_QXjuCSDy";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Получаем video_id из URL
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get("video");

    console.log("videoId:", videoId);

    // Кнопка отправки комментария
    document.getElementById("sendComment").addEventListener("click", async () => {
        console.log("Кнопка нажата!");

        const text = document.getElementById("commentText").value.trim();

        if (!text) {
            alert("Введите текст комментария");
            return;
        }

        if (!videoId) {
            alert("Ошибка: videoId не найден");
            return;
        }

        // Отправляем комментарий в Supabase
        const { data, error } = await supabase
            .from("comments")
            .insert([
                {
                    video_id: videoId,
                    name: "Аноним",        // обязательное поле
                    text: text,
                    date: new Date().toISOString() // обязательное поле
                }
            ]);

        console.log("data:", data);
        console.log("error:", error);

        if (error) {
            alert("Ошибка отправки: " + error.message);
            return;
        }

        alert("Комментарий отправлен!");
        document.getElementById("commentText").value = "";
    });
</script>




</body>
</html>
