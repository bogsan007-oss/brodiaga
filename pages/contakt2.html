<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь</title>

    <!-- Подключение CSS -->
    <link rel="stylesheet" href="contact2.css">
</head>

<body>

    <!-- ШАПКА -->
    <header class="contact-header">
        <img src="img/logo.png" alt="Логотип" class="contact-logo">
        <h1 class="contact-title">Обратная связь</h1>
        <a href="index.html" class="contact-back">Вернуться на главную</a>
    </header>


    <!-- ФОРМА ОБРАТНОЙ СВЯЗИ -->
    <section class="contact-form-section">
        <form class="contact-form">
            <input type="text" placeholder="Ваше имя" required>
            <input type="email" placeholder="Ваш Email" required>
            <textarea placeholder="Ваше сообщение" required></textarea>
            <button type="submit">Отправить</button>
        </form>
    </section>


    <!-- ПЕСНИ, КОТОРЫЕ СТОИТ ПОСЛУШАТЬ -->
    <section class="songs-section">
        <h2 class="songs-title">Песни, которые стоит послушать</h2>

        <div class="songs-grid">
            <img src="img/song1.jpg" class="song-thumb" data-video="video1.html">
            <img src="img/song2.jpg" class="song-thumb" data-video="video2.html">
            <img src="img/song3.jpg" class="song-thumb" data-video="video3.html">
            <img src="img/song4.jpg" class="song-thumb" data-video="video4.html">
            <img src="img/song5.jpg" class="song-thumb" data-video="video5.html">
            <img src="img/song6.jpg" class="song-thumb" data-video="video6.html">
            <img src="img/song7.jpg" class="song-thumb" data-video="video7.html">
            <img src="img/song8.jpg" class="song-thumb" data-video="video8.html">
        </div>
    </section>


    <!-- ФУТЕР -->
    <footer class="contact-footer">
        <p>© 2026 brodiaga.com</p>
    </footer>


    <!-- JS -->
    <script src="contact2.js"></script>

</body>
</html>
