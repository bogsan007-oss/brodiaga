<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Обратная связь — Radio Brodiaga</title>

    <meta name="description" content="Страница обратной связи Radio Brodiaga. Напишите сообщение, предложите идею или задайте вопрос.">
    <meta name="keywords" content="Radio Brodiaga, обратная связь, написать сообщение, контакт, песни старого клоуна">

    <meta name="robots" content="index, follow">
    <meta name="author" content="Старый Клоун">
    <meta name="theme-color" content="#0A3A3A">

    <link rel="canonical" href="https://radio.brodiaga.com/pages/contact.html">

    <!-- Стили -->
    <link rel="stylesheet" href="../assets/css/contact.css">
</head>

<body>

<header class="comments-header">
    <div class="ch-left">
        <img class="site-logo" src="https://raw.githubusercontent.com/bogsan007-oss/brodiaga/main/radio.brodiaga.jpg" alt="Radio Brodiaga"/>
    </div>

    <div class="ch-center">Обратная связь</div>

    <div class="ch-back">
        <a class="ch-back-link" href="../index.html">← Вернуться на главную</a>
    </div>
</header>

<main>

    <section class="contact-wrapper">
        <div class="contact-card">
            <h2 class="contact-title">Напишите мне</h2>

            <form action="https://formspree.io/f/your-id" method="POST" class="contact-form">
                <label class="contact-label">Ваш email</label>
                <input type="email" name="email" class="contact-input" required>

                <label class="contact-label">Сообщение</label>
                <textarea name="message" class="contact-textarea" required></textarea>

                <button type="submit" class="contact-button">Отправить сообщение</button>
            </form>
        </div>
    </section>

    <section class="recommend-block">
        <h2>Песни, которые стоит послушать</h2>
        <div id="recommend-cards" class="cards"></div>
    </section>

</main>

<footer class="footer">
    <div class="footer-inner">
        <p>© 2024 Radio Brodiaga — музыка для своих</p>
        <p>Связь: <a href="mailto:radio@brodiaga.com">radio@brodiaga.com</a></p>
    </div>
</footer>

<!-- Скрипты -->
<script src="../assets/js/contact.js"></script>

</body>
</html>
